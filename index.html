<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Meta Blue Card Generator | Cyber Team Help</title>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  *{font-family:'Inter',sans-serif;box-sizing:border-box;}
  body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;overflow-x:hidden;}
  .bg-animated{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
  .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;animation:blobMove 8s ease-in-out infinite alternate;}
  .blob1{width:500px;height:500px;background:#7c3aed;top:-100px;left:-100px;}
  .blob2{width:400px;height:400px;background:#1d4ed8;top:50%;right:-100px;}
  .blob3{width:300px;height:300px;background:#0891b2;bottom:-50px;left:30%;}
  @keyframes blobMove{0%{transform:translate(0,0) scale(1);}100%{transform:translate(40px,40px) scale(1.1);}}
  .glass{background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);border-radius:20px;}
  .glass-dark{background:rgba(0,0,0,0.3);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:15px;}
  .inp{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:12px;padding:12px 16px;width:100%;outline:none;}
  .btn-primary{background:linear-gradient(135deg,#7c3aed,#1d4ed8);color:#fff;border-radius:12px;padding:13px 24px;width:100%;font-weight:600;transition:0.3s;}
  .credit-card{width:340px;height:210px;border-radius:20px;padding:24px;position:relative;transform-style:preserve-3d;perspective:1000px;}
  .card-visa{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);}
  .card-mastercard{background:linear-gradient(135deg,#1a0a00,#3d1a00,#7a3000);}
  .card-number{font-family:'Courier New',monospace;font-size:18px;letter-spacing:3px;color:rgba(255,255,255,0.9);}
  .notif{position:fixed;top:20px;right:20px;z-index:9999;padding:14px 20px;border-radius:12px;transform:translateX(120%);transition:0.3s;}
  .notif.show{transform:translateX(0);}
  .notif.success{background:linear-gradient(135deg,#059669,#10b981);}
  .notif.error{background:linear-gradient(135deg,#dc2626,#ef4444);}
  .tab-btn{padding:10px 28px;border-radius:10px;font-weight:600;color:rgba(255,255,255,0.6);}
  .tab-btn.active{background:linear-gradient(135deg,#7c3aed,#1d4ed8);color:#fff;}
  .footer-dev{position:fixed;bottom:12px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.3);font-size:12px;z-index:10;}
</style>
</head>
<body>

<div class="bg-animated"><div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div></div>
<div class="notif" id="notif"></div>

<div class="footer-dev">
  Develop By : SHADOW JOKER | 
  <a href="https://wa.me/8801950178309" style="color:#4ade80;">WhatsApp</a> | 
  <a href="https://t.me/SHADOW_JOKER_CTH" style="color:#60a5fa;">Telegram</a>
</div>

<div style="position:relative;z-index:1;min-height:100vh;padding:20px 16px 60px;">
  <div style="text-align:center;padding:30px 0 20px;">
    <div class="glass" style="display:inline-flex;padding:8px 20px;border-radius:50px;margin-bottom:15px;gap:8px;align-items:center;">
      <i class="fab fa-meta" style="color:#1877f2;"></i>
      <span style="color:#fff;font-weight:700;">META VERIFIED</span>
      <i class="fas fa-check-circle" style="color:#4ade80;"></i>
    </div>
    <h1 style="font-size:clamp(22px,5vw,36px);font-weight:900;color:#fff;">Free Meta Blue Card</h1>
  </div>

  <div id="auth-section" class="glass" style="max-width:460px;margin:0 auto 24px;padding:28px;">
    <div style="display:flex;gap:8px;margin-bottom:24px;background:rgba(255,255,255,0.05);border-radius:12px;padding:4px;">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">লগইন</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">সাইন আপ</button>
    </div>
    <div id="form-login">
      <input class="inp mb-4" type="email" id="login-email" placeholder="ইমেইল"/>
      <input class="inp mb-6" type="password" id="login-pass" placeholder="পাসওয়ার্ড"/>
      <button class="btn-primary" onclick="doLogin()">প্রবেশ করুন</button>
    </div>
    <div id="form-signup" style="display:none;">
      <input class="inp mb-4" type="text" id="reg-name" placeholder="পূর্ণ নাম"/>
      <input class="inp mb-4" type="email" id="reg-email" placeholder="ইমেইল"/>
      <input class="inp mb-6" type="password" id="reg-pass" placeholder="পাসওয়ার্ড"/>
      <button class="btn-primary" onclick="doRegister()">অ্যাকাউন্ট খুলুন</button>
    </div>
  </div>

  <div id="dashboard-section" style="display:none;max-width:560px;margin:0 auto;">
    <div class="glass" style="padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:40px;height:40px;background:#7c3aed;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;" id="user-avatar">?</div>
        <div style="color:#fff;font-weight:700;" id="user-name-display">User</div>
      </div>
      <button onclick="location.reload()" class="text-red-400 text-xs">লগআউট</button>
    </div>

    <div class="glass" style="padding:20px;margin-bottom:24px;">
      <input class="inp mb-4" type="text" id="holder-name" placeholder="কার্ডের নাম"/>
      <div class="flex gap-4">
        <button onclick="generateCard('visa')" class="flex-1 bg-blue-600/40 p-3 rounded-xl text-white font-bold">Visa</button>
        <button onclick="generateCard('mastercard')" class="flex-1 bg-orange-600/40 p-3 rounded-xl text-white font-bold">Mastercard</button>
      </div>
    </div>

    <div id="result-wrap" style="display:none;">
        <div class="credit-card mx-auto mb-6" id="gen-card">
            <div class="flex justify-between items-center mb-10">
                <div style="width:40px;height:30px;background:gold;border-radius:5px;"></div>
                <div id="card-brand-icon" class="text-white text-3xl"></div>
            </div>
            <div class="card-number text-left mb-6" id="card-num-display"></div>
            <div class="flex justify-between text-left">
                <div><div class="text-[8px] text-gray-400">CARD HOLDER</div><div class="text-white text-xs font-bold uppercase" id="card-holder-display"></div></div>
                <div class="text-right"><div class="text-[8px] text-gray-400">EXPIRES</div><div class="text-white text-xs font-bold" id="card-exp-display"></div></div>
            </div>
        </div>
        <div class="glass-dark p-5 mb-6 text-left border border-white/10" style="max-width:340px; margin: 0 auto;">
            <h4 class="text-emerald-400 text-xs font-bold mb-3 uppercase tracking-wider">বিলিং এড্রেস</h4>
            <div class="text-white text-[11px] space-y-1">
                <p>Street: <span id="addr-street"></span></p>
                <p>City: <span id="addr-city"></span></p>
                <p>Zip: <span id="addr-zip"></span></p>
                <p>Country: Bangladesh</p>
            </div>
            <button onclick="copyCardInfo()" class="w-full mt-4 bg-white/5 py-2 rounded text-[10px] text-white">কপি কার্ড ও এড্রেস</button>
        </div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin; // This is the fix for Render
let currentUser = null;
let currentCard = null;

const bdAddresses = [
  {street: "Purbo Bagdi, Ward 04", city: "Narshingdi", zip: "1600"},
  {street: "Dhanmondi 32, Road 12", city: "Dhaka", zip: "1209"},
  {street: "Zindabazar Point", city: "Sylhet", zip: "3100"}
];

function showNotif(msg, type='info'){
  const el = document.getElementById('notif');
  el.textContent = msg; el.className = `notif ${type} show`;
  setTimeout(()=>el.classList.remove('show'), 3000);
}

function switchTab(tab){
  document.getElementById('form-login').style.display = tab==='login'?'block':'none';
  document.getElementById('form-signup').style.display = tab==='signup'?'block':'none';
  document.getElementById('tab-login').classList.toggle('active', tab==='login');
  document.getElementById('tab-signup').classList.toggle('active', tab==='signup');
}

async function doRegister(){
  const name=document.getElementById('reg-name').value, email=document.getElementById('reg-email').value, password=document.getElementById('reg-pass').value;
  const res = await fetch(`${API}/api/register`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, email, password})});
  const data = await res.json();
  if(data.success){ showNotif(data.message, 'success'); switchTab('login'); } else showNotif(data.message, 'error');
}

async function doLogin(){
  const email=document.getElementById('login-email').value, password=document.getElementById('login-pass').value;
  const res = await fetch(`${API}/api/login`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email, password})});
  const data = await res.json();
  if(data.success){
    currentUser = data.user;
    document.getElementById('auth-section').style.display='none';
    document.getElementById('dashboard-section').style.display='block';
    document.getElementById('user-name-display').textContent=currentUser.name;
    document.getElementById('user-avatar').textContent=currentUser.name[0].toUpperCase();
    showNotif('লগইন সফল!', 'success');
  } else showNotif(data.message, 'error');
}

async function generateCard(type){
  const name = document.getElementById('holder-name').value || currentUser.name;
  const res = await fetch(`${API}/api/generate-card`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({holder_name:name})});
  const data = await res.json();
  if(data.success){
    currentCard = data.card;
    document.getElementById('result-wrap').style.display='block';
    document.getElementById('gen-card').className = `credit-card mx-auto mb-6 ${currentCard.type==='visa'?'card-visa':'card-mastercard'}`;
    document.getElementById('card-num-display').textContent = currentCard.number.match(/.{1,4}/g).join(' ');
    document.getElementById('card-holder-display').textContent = currentCard.holder;
    document.getElementById('card-exp-display').textContent = `${currentCard.month}/29`;
    document.getElementById('card-brand-icon').innerHTML = `<i class="fab fa-cc-${currentCard.type}"></i>`;
    const addr = bdAddresses[Math.floor(Math.random()*bdAddresses.length)];
    document.getElementById('addr-street').textContent = addr.street;
    document.getElementById('addr-city').textContent = addr.city;
    document.getElementById('addr-zip').textContent = addr.zip;
    showNotif('কার্ড তৈরি হয়েছে!', 'success');
  }
}

function copyCardInfo(){
  const s=document.getElementById('addr-street').textContent;
  const info = `Card: ${currentCard.number}\nHolder: ${currentCard.holder}\nExpiry: ${currentCard.month}/29\nCVV: ${currentCard.cvv}\nAddress: ${s}`;
  navigator.clipboard.writeText(info).then(()=>showNotif('সব তথ্য কপি হয়েছে!', 'success'));
}
</script>
</body>
</html>
