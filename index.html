<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Free Meta Blue Verification Card | Cyber Team Help</title>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  *{font-family:'Inter',sans-serif;box-sizing:border-box;}
  body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;overflow-x:hidden;}

  /* Animated background (Blobs) */
  .bg-animated{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
  .blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;animation:blobMove 8s ease-in-out infinite alternate;}
  .blob1{width:500px;height:500px;background:#7c3aed;top:-100px;left:-100px;animation-delay:0s;}
  .blob2{width:400px;height:400px;background:#1d4ed8;top:50%;right:-100px;animation-delay:3s;}
  .blob3{width:300px;height:300px;background:#0891b2;bottom:-50px;left:30%;animation-delay:6s;}
  @keyframes blobMove{0%{transform:translate(0,0) scale(1);}100%{transform:translate(40px,40px) scale(1.1);}}

  /* Glass card effect */
  .glass{background:rgba(255,255,255,0.07);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);border-radius:20px;}
  .glass-dark{background:rgba(0,0,0,0.3);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;}

  /* Input Style */
  .inp{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:12px;padding:12px 16px;width:100%;transition:all 0.3s;outline:none;}
  .inp:focus{border-color:#7c3aed;background:rgba(124,58,237,0.15);box-shadow:0 0 0 3px rgba(124,58,237,0.2);}

  /* Primary Button */
  .btn-primary{background:linear-gradient(135deg,#7c3aed,#1d4ed8);color:#fff;border:none;border-radius:12px;padding:13px 24px;width:100%;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden;}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,58,237,0.5);}

  /* Credit Card Visual Styling */
  .credit-card{width:340px;height:210px;border-radius:20px;padding:24px;position:relative;cursor:pointer;transition:transform 0.5s;transform-style:preserve-3d;perspective:1000px;}
  .card-visa{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);}
  .card-mastercard{background:linear-gradient(135deg,#1a0a00,#3d1a00,#7a3000);}
  .card-chip{width:40px;height:32px;background:linear-gradient(135deg,#d4af37,#ffd700,#b8860b);border-radius:6px;}
  .card-number{font-family:'Courier New',monospace;font-size:18px;letter-spacing:3px;color:rgba(255,255,255,0.9);}
  .card-shine{position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.05),transparent);animation:shine 4s ease-in-out infinite;pointer-events:none;}
  @keyframes shine{0%{left:-100%;}50%{left:100%;}100%{left:100%;}}

  /* Notification & Tabs */
  .notif{position:fixed;top:20px;right:20px;z-index:9999;padding:14px 20px;border-radius:12px;font-weight:500;transform:translateX(120%);transition:transform 0.3s;max-width:320px;}
  .notif.show{transform:translateX(0);}
  .notif.success{background:linear-gradient(135deg,#059669,#10b981);}
  .notif.error{background:linear-gradient(135deg,#dc2626,#ef4444);}
  .tab-btn{padding:10px 28px;border-radius:10px;font-weight:600;cursor:pointer;transition:all 0.3s;color:rgba(255,255,255,0.6);}
  .tab-btn.active{background:linear-gradient(135deg,#7c3aed,#1d4ed8);color:#fff;box-shadow:0 4px 15px rgba(124,58,237,0.4);}

  /* Mini Particle Effects */
  .particle{position:fixed;width:3px;height:3px;background:rgba(255,255,255,0.3);border-radius:50%;animation:float linear infinite;pointer-events:none;}
  @keyframes float{0%{transform:translateY(100vh);opacity:0;}100%{transform:translateY(-100px);opacity:0;}}

  .footer-dev{position:fixed;bottom:12px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.3);font-size:12px;z-index:10;}
</style>
</head>
<body>

<div class="bg-animated">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<div class="notif" id="notif"></div>
<div id="particles"></div>

<div class="footer-dev" id="dev-footer">
  Develop By : SHADOW JOKER | 
  <a href="https://wa.me/8801950178309" target="_blank" style="color:#4ade80;text-decoration:underline;">WhatsApp</a> | 
  <a href="https://t.me/SHADOW_JOKER_CTH" target="_blank" style="color:#60a5fa;text-decoration:underline;">Telegram</a>
</div>

<div style="position:relative;z-index:1;min-height:100vh;padding:20px 16px 60px;">
  
  <div style="text-align:center;padding:30px 0 20px;">
    <div class="glass" style="display:inline-flex;padding:8px 20px;border-radius:50px;margin-bottom:15px;gap:8px;align-items:center;">
      <i class="fab fa-meta" style="color:#1877f2;"></i>
      <span style="color:#fff;font-weight:700;font-size:14px;">META VERIFIED</span>
      <i class="fas fa-check-circle" style="color:#4ade80;"></i>
    </div>
    <h1 style="font-size:clamp(22px,5vw,36px);font-weight:900;color:#fff;margin-bottom:6px;">Free Meta Blue Card</h1>
    <p style="color:rgba(255,255,255,0.6);font-size:15px;">আপনার কাস্টম মেটা ভেরিফাইড কার্ড তৈরি করুন</p>
  </div>

  <div id="auth-section" class="glass" style="max-width:460px;margin:0 auto 24px;padding:28px;">
    <div style="display:flex;gap:8px;margin-bottom:24px;background:rgba(255,255,255,0.05);border-radius:12px;padding:4px;">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">লগইন</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">সাইন আপ</button>
    </div>

    <div id="form-login">
      <input class="inp mb-4" type="email" id="login-email" placeholder="ইমেইল ঠিকানা"/>
      <input class="inp mb-6" type="password" id="login-pass" placeholder="পাসওয়ার্ড"/>
      <button class="btn-primary w-full" onclick="doLogin()"><i class="fas fa-sign-in-alt mr-2"></i>প্রবেশ করুন</button>
    </div>

    <div id="form-signup" style="display:none;">
      <input class="inp mb-4" type="text" id="reg-name" placeholder="আপনার পূর্ণ নাম"/>
      <input class="inp mb-4" type="email" id="reg-email" placeholder="ইমেইল ঠিকানা"/>
      <input class="inp mb-6" type="password" id="reg-pass" placeholder="পাসওয়ার্ড তৈরি করুন"/>
      <button class="btn-primary w-full" onclick="doRegister()"><i class="fas fa-user-plus mr-2"></i>অ্যাকাউন্ট তৈরি করুন</button>
    </div>
  </div>

  <div id="dashboard-section" style="display:none;max-width:560px;margin:0 auto;">
    <div class="glass" style="padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="width:46px;height:46px;background:linear-gradient(135deg,#7c3aed,#1d4ed8);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;" id="user-avatar">?</div>
        <div>
          <div style="color:#fff;font-weight:700;" id="user-name-display">ব্যবহারকারী</div>
          <div style="color:rgba(255,255,255,0.5);font-size:12px;">স্ট্যাটাস: <span class="text-green-400">অ্যাপ্রুভড</span></div>
        </div>
      </div>
      <button onclick="doLogout()" class="text-red-300 text-sm bg-red-900/20 px-3 py-1 rounded-lg">লগআউট</button>
    </div>

    <div class="glass" style="padding:20px;margin-bottom:16px;">
      <h3 class="text-white font-bold mb-4"><i class="fas fa-magic mr-2"></i>কার্ড তৈরি করুন</h3>
      <input class="inp mb-4" type="text" id="holder-name" placeholder="কার্ডে যে নাম থাকবে"/>
      <div class="flex gap-4">
        <button onclick="generateCard('visa')" class="flex-1 bg-blue-600/50 hover:bg-blue-600 border border-blue-400/30 p-3 rounded-xl text-white font-bold transition-all">Visa Card</button>
        <button onclick="generateCard('mastercard')" class="flex-1 bg-orange-600/50 hover:bg-orange-600 border border-orange-400/30 p-3 rounded-xl text-white font-bold transition-all">Mastercard</button>
      </div>
    </div>

    <div id="card-visual-wrap" style="display:none; text-align:center; margin-bottom:20px;">
        <div class="credit-card mx-auto" id="gen-card">
            <div class="card-shine"></div>
            <div class="flex justify-between items-center mb-10">
                <div class="card-chip"></div>
                <div id="card-brand-icon" class="text-white text-3xl"></div>
            </div>
            <div class="card-number text-left mb-6" id="card-num-display"></div>
            <div class="flex justify-between text-left">
                <div>
                    <div class="text-[8px] text-gray-400">CARD HOLDER</div>
                    <div class="text-white text-xs font-bold uppercase" id="card-holder-display"></div>
                </div>
                <div class="text-right">
                    <div class="text-[8px] text-gray-400">EXPIRES</div>
                    <div class="text-white text-xs font-bold" id="card-exp-display"></div>
                </div>
            </div>
        </div>
        <button onclick="copyCardInfo()" class="mt-4 text-xs text-blue-300 bg-blue-900/30 px-4 py-2 rounded-full border border-blue-500/30">কার্ড তথ্য কপি করুন</button>
    </div>

    <div class="glass" style="padding:20px;" id="my-cards-section">
      <h3 class="text-white font-bold mb-4"><i class="fas fa-history mr-2"></i>জেনারেটেড কার্ডসমূহ</h3>
      <div id="cards-list" class="text-gray-500 text-center text-sm py-4">কোনো কার্ড নেই</div>
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let currentUser = null;
let currentCard = null;

// Background Particles
function createParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 15; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.animationDuration = (5 + Math.random() * 10) + 's';
    container.appendChild(p);
  }
}
createParticles();

function showNotif(msg, type = 'info') {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.className = `notif ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

function switchTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
}

async function doRegister() {
  const name = document.getElementById('reg-name').value;
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-pass').value;
  if(!name || !email || !password) return showNotif('সব তথ্য পূরণ করুন', 'error');

  const res = await fetch(`${API}/api/register`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name, email, password})
  });
  const data = await res.json();
  if(data.success) { showNotif(data.message, 'success'); switchTab('login'); }
  else showNotif(data.message, 'error');
}

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-pass').value;
  
  const res = await fetch(`${API}/api/login`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email, password})
  });
  const data = await res.json();
  if(data.success) {
    currentUser = data.user;
    showDashboard();
    showNotif('লগইন সফল!', 'success');
  } else showNotif(data.message, 'error');
}

function showDashboard() {
  document.getElementById('auth-section').style.display = 'none';
  document.getElementById('dashboard-section').style.display = 'block';
  document.getElementById('user-name-display').textContent = currentUser.name;
  document.getElementById('user-avatar').textContent = currentUser.name[0].toUpperCase();
}

async function generateCard(type) {
  const nameInput = document.getElementById('holder-name').value.trim();
  const name = nameInput || currentUser.name;
  
  const res = await fetch(`${API}/api/generate-card`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({holder_name: name})
  });
  const data = await res.json();
  
  if(data.success) {
    currentCard = data.card;
    document.getElementById('card-visual-wrap').style.display = 'block';
    document.getElementById('gen-card').className = `credit-card mx-auto ${currentCard.type === 'visa' ? 'card-visa' : 'card-mastercard'}`;
    document.getElementById('card-num-display').textContent = currentCard.number.match(/.{1,4}/g).join(' ');
    document.getElementById('card-holder-display').textContent = currentCard.holder;
    document.getElementById('card-exp-display').textContent = `${currentCard.month}/29`;
    document.getElementById('card-brand-icon').innerHTML = `<i class="fab fa-cc-${currentCard.type}"></i>`;
    showNotif('কার্ড সফলভাবে জেনারেট হয়েছে!', 'success');
    updateHistory(currentCard);
  }
}

function updateHistory(card) {
    const list = document.getElementById('cards-list');
    if(list.innerText === 'কোনো কার্ড নেই') list.innerHTML = '';
    const item = document.createElement('div');
    item.className = 'glass-dark flex justify-between items-center p-3 mt-2 rounded-xl border border-white/5';
    item.innerHTML = `
      <div class="flex items-center gap-3">
        <i class="fab fa-cc-${card.type} text-lg text-white/70"></i>
        <div class="text-left">
          <div class="text-white text-xs font-mono">${card.number.slice(-4)} **** **** ****</div>
          <div class="text-[10px] text-gray-500">${card.holder}</div>
        </div>
      </div>
      <div class="text-[10px] text-gray-500">${card.month}/29</div>
    `;
    list.prepend(item);
}

function copyCardInfo() {
  if(!currentCard) return;
  const info = `Card: ${currentCard.number}\nHolder: ${currentCard.holder}\nExpiry: ${currentCard.month}/29\nCVV: ${currentCard.cvv}`;
  navigator.clipboard.writeText(info).then(() => showNotif('কার্ড তথ্য কপি হয়েছে!', 'success'));
}

function doLogout() { location.reload(); }
</script>
</body>
          </html>
